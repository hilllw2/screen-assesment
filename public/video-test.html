<!DOCTYPE html>
<html>
<head><title>Video Test</title></head>
<body>
<h1>Direct Video Test (no framework)</h1>
<p>If this video plays, the file is accessible. If not, there's a server/hosting issue.</p>

<h2>Test 1: source element</h2>
<video width="640" height="360" controls playsinline preload="metadata">
  <source src="/Verbal-Assessment-Videos/Verbal-Assessment-Overview.mp4" type="video/mp4">
  Video not supported
</video>

<h2>Test 2: src attribute</h2>
<video width="640" height="360" controls playsinline preload="metadata"
  src="/Verbal-Assessment-Videos/Verbal-Assessment-Overview.mp4">
  Video not supported
</video>

<h2>Test 3: Written assessment video</h2>
<video width="640" height="360" controls playsinline preload="metadata"
  src="/Written-Assessment-Videos/Writing-Assessment-Task.mp4">
  Video not supported
</video>

<hr>
<h2>Debug Info</h2>
<pre id="debug"></pre>
<script>
  const debug = document.getElementById('debug');
  const videos = document.querySelectorAll('video');
  videos.forEach((v, i) => {
    v.addEventListener('error', (e) => {
      debug.textContent += 'Video ' + (i+1) + ' ERROR: code=' + (v.error?.code) + ' msg=' + (v.error?.message) + ' src=' + v.currentSrc + '\n';
    });
    v.addEventListener('loadedmetadata', () => {
      debug.textContent += 'Video ' + (i+1) + ' LOADED OK: duration=' + v.duration + 's src=' + v.currentSrc + '\n';
    });
  });
  debug.textContent += 'Page loaded at: ' + new Date().toISOString() + '\n';
  debug.textContent += 'Location: ' + window.location.href + '\n';
  debug.textContent += 'Cookies: ' + (document.cookie || '(none)') + '\n';
</script>
</body>
</html>
